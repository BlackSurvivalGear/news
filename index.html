.command-btn:hover{background:#0c2430;transform:translateY(-2px);box-shadow:0 0 12px #00ffee66,0 0 24px #00ffee33}

.channel{background:#071923;border:none;color:#7fd6df;padding:0 14px;cursor:pointer}.channel.active{background:#092631;color:#00ffee}

@keyframes scroll{100%{transform:translateX(-100%)}}

iframe,.map-frame{width:100%;height:100%;border:none}

function loadPanAfricaHub(){

function loadRegionFeeds(region){
const countries=africaData[region];
let html="<div style='display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:14px'>";
Object.entries(countries).forEach(([country,sources])=>{
html+=`<div class='feed-panel'><div class='feed-label'>${country}</div><div style='padding:54px 14px'>`;
sources.forEach(src=>html+=`<p style='margin:12px 0'><a href='${src[1]}' target='_blank'>${src[0]}</a></p>`);
html+='</div></div>'});
html+='</div>';
document.getElementById('panAfricaViewport').innerHTML=html;
}

function loadChannelHub(channels,label){
active('newsBtn');
let regionKeys=Object.keys(channels);
let menu=regionKeys.map(k=>`<button class='command-btn' onclick="loadChannelRegion(${label==='WESTERN'?'westernChannels':'easternChannels'},'${k}')">${k.replace(/([A-Z])/g,' $1').trim().toUpperCase()}</button><br><br>`).join('');
menu+=`<button class='command-btn' onclick='loadNews()'>⬅ BACK</button>`;
renderOps(menu,`<div style='display:flex;flex-direction:column;height:100%'><div id='hubChannelBar'></div><div id='channelHubViewport' style='flex:1;min-height:0;overflow-y:auto'></div></div>`);
loadChannelRegion(channels,regionKeys[0]);
}
function loadChannelRegion(channels,region){
const feeds=channels[region];
let cols=Math.min(feeds.length,3);
let rows=Math.ceil(feeds.length/cols);
let bar="<div style='display:flex;gap:0;overflow-x:auto;border-bottom:1px solid #00ffee44;background:#061018;flex-shrink:0'>";
feeds.forEach((f,i)=>bar+=`<button onclick="document.getElementById('channelHubViewport').innerHTML='<iframe src=\\'${f[1]}\\' style=\\'width:100%;height:100%;border:none\\' allow=\\'autoplay;encrypted-media\\' allowfullscreen></iframe>'" style='padding:6px 12px;background:none;border:none;border-right:1px solid #00ffee22;color:#00ffee;font-family:Share Tech Mono;font-size:11px;cursor:pointer;white-space:nowrap;transition:background 0.15s'onmouseover='this.style.background="#0c2430"'onmouseout='this.style.background="none"'>${f[0]}</button>`);
bar+='</div>';
let hubBar=document.getElementById('hubChannelBar');if(hubBar)hubBar.innerHTML=bar;
let html=`<div style='height:100%;display:grid;grid-template-columns:repeat(${cols},1fr);grid-template-rows:repeat(${rows},1fr);gap:2px'>`;
feeds.forEach(f=>html+=`<div class='feed-panel'><div class='feed-label'>${f[0]}</div><iframe src='${f[1]}' allow='autoplay;encrypted-media' allowfullscreen></iframe></div>`);
html+='</div>';
document.getElementById('channelHubViewport').innerHTML=html;
}

function exitFullScreen(){full=false;document.getElementById('opsBay').style.cssText='';loadNews()}
function updateChannelBar(){let bar=document.getElementById('channelBar');if(bar)bar.innerHTML=renderChannelBar(africa?africaFeeds:globalFeeds)}
function renderChannelBar(feeds){
let bar="<div style='display:flex;gap:0;overflow-x:auto;border-bottom:1px solid #00ffee44;background:#061018;flex-shrink:0'>";
feeds.forEach((f,i)=>bar+=`<button onclick='idx=${i};full=true;renderNews()' style='padding:6px 12px;background:none;border:none;border-right:1px solid #00ffee22;color:#00ffee;font-family:Share Tech Mono;font-size:11px;cursor:pointer;white-space:nowrap;transition:background 0.15s'onmouseover='this.style.background="#0c2430"'onmouseout='this.style.background="none"'>${f[0]}</button>`);
return bar+'</div>'}
function loadNews(){
active('newsBtn');
renderOps(`
<button class='command-btn' onclick="africa=false;full=false;updateChannelBar();renderNews()">GLOBAL NEWS</button><br><br>
<button class='command-btn' onclick="africa=true;full=false;updateChannelBar();renderNews()">AFRICA NEWS</button><br><br>
<button class='command-btn' onclick="loadChannelHub(westernChannels,'WESTERN')">WESTERN NEWS</button><br><br>
<button class='command-btn' onclick="loadChannelHub(easternChannels,'EASTERN')">EASTERN NEWS</button><br><br>
<button class='command-btn' onclick="full=!full;idx=(idx+1)%6;renderNews()">FULL SCREEN</button><br><br>
<button class='command-btn' onclick='loadPanAfricaHub()'>PAN AFRICAN NEWS</button>
`,`<div style='display:flex;flex-direction:column;height:100%'><div id='channelBar'></div><div id='newsViewport' style='flex:1;min-height:0'></div></div>`);
let currentFeeds=africa?africaFeeds:globalFeeds;
document.getElementById('channelBar').innerHTML=renderChannelBar(currentFeeds);
renderNews();
}

const tags=['AJ','BBC','SKY','RT'];let cf=0;
document.querySelectorAll('.channel').forEach((b,i)=>b.onclick=()=>{document.querySelectorAll('.channel').forEach(x=>x.classList.remove('active'));b.classList.add('active');cf=i;loadTicker()});
async function loadTicker(){try{let r=await fetch('https://api.rss2json.com/v1/api.json?rss_url='+encodeURIComponent(rss[cf]));let d=await r.json();newsTicker.innerHTML=d.items.slice(0,10).map(i=>`<a class='headline-link' href='${i.link}' target='_blank'>[${tags[cf]}] ${i.title}</a>`).join('')}catch(e){newsTicker.innerHTML='Tactical Feed Offline...'}}
loadTicker();loadNews();
async function fetchPrices(){
let gotGold=false,gotSilver=false,gotBrent=false;
try{const r=await fetch('https://scanner.tradingview.com/global/scan',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({symbols:{tickers:['TVC:GOLD','TVC:SILVER','NYMEX:BB1!']},columns:['close']})});const d=await r.json();d.data.forEach(item=>{if(item.s==='TVC:GOLD'){document.getElementById('priceGold').textContent=Math.round(item.d[0]).toLocaleString();gotGold=true}if(item.s==='TVC:SILVER'){document.getElementById('priceSilver').textContent=item.d[0].toFixed(2);gotSilver=true}if(item.s.includes('BB1')){document.getElementById('priceBrent').textContent=item.d[0].toFixed(1);gotBrent=true}})}catch(e){}
if(!gotGold){try{const r=await fetch('https://api.coingecko.com/api/v3/simple/price?ids=pax-gold&vs_currencies=usd');const d=await r.json();document.getElementById('priceGold').textContent=Math.round(d['pax-gold'].usd).toLocaleString()}catch(e){}}
if(!gotSilver){try{const r=await fetch('https://api.allorigins.win/get?url='+encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/SI=F?interval=1d&range=1d'));const w=await r.json();const d=JSON.parse(w.contents);document.getElementById('priceSilver').textContent=d.chart.result[0].meta.regularMarketPrice.toFixed(2)}catch(e){}}
if(!gotBrent){try{const r=await fetch('https://api.allorigins.win/get?url='+encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/BZ=F?interval=1d&range=1d'));const w=await r.json();const d=JSON.parse(w.contents);document.getElementById('priceBrent').textContent=d.chart.result[0].meta.regularMarketPrice.toFixed(1)}catch(e){}}
try{const r=await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd');const d=await r.json();document.getElementById('priceBtc').textContent=Math.round(d.bitcoin.usd).toLocaleString()}catch(e){}
}
fetchPrices();setInterval(fetchPrices,60000);
</script>
