function marketView(mode){const f=document.getElementById('marketFrame');const w=tvWidgets[mode];f.innerHTML='<div class="tradingview-widget-container"><div class="tradingview-widget-container__widget"></div></div>';const s=document.createElement('script');s.type='text/javascript';s.src=w.src;s.async=true;s.textContent=JSON.stringify(w.cfg);f.querySelector('.tradingview-widget-container').appendChild(s)}
function loadMarkets(){active('marketsBtn');renderOps(`
<button class='command-btn' onclick=\"marketView('overview')\">OVERVIEW</button><br><br>
<button class='command-btn' onclick=\"marketView('stocks')\">STOCKS</button><br><br>
<button class='command-btn' onclick=\"marketView('crypto')\">CRYPTO</button>
`,`<div id='marketFrame' style='height:100%'></div>`);marketView('overview')}

newsBtn.onclick=loadNews;mapBtn.onclick=loadConflict;marineBtn.onclick=loadMarine;flightBtn.onclick=loadFlight;marketsBtn.onclick=loadMarkets;
const rss=['https://www.aljazeera.com/xml/rss/all.xml','http://feeds.bbci.co.uk/news/world/rss.xml','https://feeds.skynews.com/feeds/rss/world.xml','https://www.rt.com/rss/news/'];
const tags=['AJ','BBC','SKY','RT'];let cf=0;
document.querySelectorAll('.channel').forEach((b,i)=>b.onclick=()=>{document.querySelectorAll('.channel').forEach(x=>x.classList.remove('active'));b.classList.add('active');cf=i;loadTicker()});
async function loadTicker(){try{let r=await fetch('https://api.rss2json.com/v1/api.json?rss_url='+encodeURIComponent(rss[cf]));let d=await r.json();newsTicker.innerHTML=d.items.slice(0,10).map(i=>`<a class='headline-link' href='${i.link}' target='_blank'>[${tags[cf]}] ${i.title}</a>`).join('')}catch(e){newsTicker.innerHTML='Tactical Feed Offline...'}}
loadTicker();loadNews();
async function fetchPrices(){
const mp=document.querySelectorAll('.market-price');
try{const r=await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT');const d=await r.json();mp[2].textContent=Math.round(parseFloat(d.price)).toLocaleString()}catch(e){}
try{const r=await fetch('https://api.coingecko.com/api/v3/simple/price?ids=pax-gold&vs_currencies=usd');const d=await r.json();mp[1].textContent=Math.round(d['pax-gold'].usd).toLocaleString()}catch(e){}
try{const r=await fetch('https://api.allorigins.win/get?url='+encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/BZ=F?interval=1d&range=1d'));const w=await r.json();const d=JSON.parse(w.contents);mp[0].textContent=d.chart.result[0].meta.regularMarketPrice.toFixed(1)}catch(e){}
}
fetchPrices();setInterval(fetchPrices,60000);
</script>
