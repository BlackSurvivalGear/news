<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liveuamap Tactical Feed</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Rajdhani',sans-serif;
    background:#020606;
    color:#ffffff;
}

/* HEADER */
.header{
    text-align:center;
    padding:20px;
    border-bottom:1px solid #00ffc3;
}

.header h1{
    margin:0;
    color:#00ffc3;
    font-size:22px;
}

.header p{
    margin-top:5px;
    font-size:13px;
    opacity:0.7;
}

/* CONTROLS */
.controls{
    display:flex;
    justify-content:center;
    gap:10px;
    padding:15px;
}

select, button{
    background:#061018;
    color:#00ffc3;
    border:1px solid #00ffc3;
    padding:8px 12px;
    cursor:pointer;
    font-family:'Rajdhani',sans-serif;
}

button:hover{
    background:#00ffc3;
    color:#000;
}

/* STATUS */
.status{
    text-align:center;
    font-size:12px;
    opacity:0.7;
    margin-bottom:10px;
}

/* FEED */
.feed{
    max-width:900px;
    margin:auto;
    padding:10px;
    display:flex;
    flex-direction:column;
    gap:12px;
}

/* ITEM */
.item{
    background:#020606;
    padding:12px;
    font-size:14px;
    border-left:3px solid #00ffc3;
}

.title{
    font-weight:bold;
    color:#00ffc3;
}

.meta{
    font-size:12px;
    opacity:0.6;
    margin:6px 0;
}

a{
    color:#00aaff;
    font-size:12px;
    text-decoration:none;
}

a:hover{
    text-decoration:underline;
}
</style>

</head>

<body>

<div class="header">
    <h1>TACTICAL INTELLIGENCE FEED</h1>
    <p>Liveuamap Event Stream</p>
</div>

<div class="controls">
    <select id="region">
        <option value="0">Ukraine</option>
        <option value="3">Syria</option>
        <option value="1">Global / Mixed</option>
    </select>

```
<button onclick="loadFeed()">LOAD FEED</button>
```

</div>

<div id="status" class="status">
    Standby. Awaiting feed load.
</div>

<div id="feed" class="feed"></div>

<script>

/* ===============================
   🔑 INSERT YOUR API KEY BELOW
   =============================== */

const API_KEY = "7972bb2efd5dd840083e443991563d73";

/* Example:
const API_KEY = "7972bb2efd5dd840083e443991563d73";
*/

/* =============================== */

let autoRefresh = null;

async function loadFeed(){
    const region = document.getElementById("region").value;
    const feed = document.getElementById("feed");
    const status = document.getElementById("status");

    status.innerText = "Loading tactical feed...";
    feed.innerHTML = "";

    try{
        const url = `https://a.liveuamap.com/api?a=mpts&resid=${region}&count=25&key=${API_KEY}`;
        const res = await fetch(url);
        const data = await res.json();

        if(!data.venues || data.venues.length === 0){
            status.innerText = "No events returned.";
            return;
        }

        data.venues.forEach(event => {

            let color = "#00ffc3";
            const text = (event.name || "").toLowerCase();

            if(text.includes("explosion")) color = "#ff3b3b";
            else if(text.includes("strike")) color = "#ff8800";
            else if(text.includes("protest")) color = "#ffd000";

            const item = document.createElement("div");
            item.className = "item";
            item.style.borderLeft = "3px solid " + color;

            const time = new Date(event.timestamp * 1000).toLocaleString();

            item.innerHTML = `
                <div class="title">${event.name}</div>
                <div class="meta">${time}</div>
                <a href="${event.link}" target="_blank">View Full Report</a>
            `;

            feed.appendChild(item);
        });

        status.innerText = "Live • Auto-refresh every 60 seconds";

        startAutoRefresh();

    }catch(err){
        console.error(err);
        status.innerText = "⚠️ Failed to load (API key, rate limit, or CORS issue)";
    }
}

function startAutoRefresh(){
    if(autoRefresh) clearInterval(autoRefresh);
    autoRefresh = setInterval(loadFeed, 60000);
}

</script>

</body>
</html>
